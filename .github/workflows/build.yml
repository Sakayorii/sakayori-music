name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true -Dkotlin.incremental=false

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 fakeroot rpm file desktop-file-utils wget

      - run: chmod +x ./gradlew

      - name: VLC setup (with retry)
        run: |
          for i in 1 2 3; do
            ./gradlew vlcSetup --stacktrace && break
            echo "vlcSetup attempt $i failed, retrying..."
            sleep 10
          done

      - run: ./gradlew composeApp:packageDeb composeApp:packageRpm composeApp:createDistributable -PisFullBuild=true --stacktrace

      - name: Build AppImage (x86_64)
        run: |
          set -e
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          APPDIR=composeApp/build/AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr"
          cp -r composeApp/build/compose/binaries/main/app/SakayoriMusic/. "$APPDIR/usr/"

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/SakayoriMusic" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          cat > "$APPDIR/sakayori-music.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=SakayoriMusic
          Comment=SakayoriMusic - Music Player
          Exec=SakayoriMusic
          Icon=sakayori-music
          Categories=AudioVideo;Audio;Player;
          Terminal=false
          EOF

          cp composeApp/icon/circle_app_icon.png "$APPDIR/sakayori-music.png"

          ARCH=x86_64 ./appimagetool "$APPDIR" composeApp/build/SakayoriMusic-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-linux-x86_64
          path: |
            composeApp/build/compose/binaries/main/deb/*.deb
            composeApp/build/compose/binaries/main/rpm/*.rpm
            composeApp/build/SakayoriMusic-x86_64.AppImage
          if-no-files-found: error

  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 fakeroot rpm file desktop-file-utils wget libvlc-dev vlc-plugin-base libvlc5

      - run: chmod +x ./gradlew

      - name: VLC setup (best-effort, fallback to system VLC)
        run: |
          mkdir -p vlc-natives/linux
          SUCCESS=0
          for i in 1 2 3; do
            if ./gradlew vlcSetup --stacktrace; then
              SUCCESS=1
              break
            fi
            echo "vlcSetup attempt $i failed, retrying..."
            sleep 10
          done
          if [ $SUCCESS -eq 0 ]; then
            echo "vlcSetup failed on aarch64 — falling back to apt-installed system VLC. Build will not bundle VLC natives."
            mkdir -p vlc-natives/linux
          fi

      - run: ./gradlew composeApp:packageDeb composeApp:packageRpm composeApp:createDistributable -PisFullBuild=true --stacktrace

      - name: Build AppImage (aarch64)
        run: |
          set -e
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-aarch64.AppImage -O appimagetool
          chmod +x appimagetool

          APPDIR=composeApp/build/AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr"
          cp -r composeApp/build/compose/binaries/main/app/SakayoriMusic/. "$APPDIR/usr/"

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/SakayoriMusic" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          cat > "$APPDIR/sakayori-music.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=SakayoriMusic
          Comment=SakayoriMusic - Music Player
          Exec=SakayoriMusic
          Icon=sakayori-music
          Categories=AudioVideo;Audio;Player;
          Terminal=false
          EOF

          cp composeApp/icon/circle_app_icon.png "$APPDIR/sakayori-music.png"

          ARCH=aarch64 ./appimagetool "$APPDIR" composeApp/build/SakayoriMusic-aarch64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-linux-aarch64
          path: |
            composeApp/build/compose/binaries/main/deb/*.deb
            composeApp/build/compose/binaries/main/rpm/*.rpm
            composeApp/build/SakayoriMusic-aarch64.AppImage
          if-no-files-found: error

  macos:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - run: chmod +x ./gradlew

      - name: Show active Xcode
        run: xcode-select -p && xcodebuild -version

      - name: VLC setup (with retry)
        run: |
          for i in 1 2 3; do
            ./gradlew vlcSetup --stacktrace && break
            echo "vlcSetup attempt $i failed, retrying..."
            sleep 10
          done

      - run: ./gradlew composeApp:packageDmg composeApp:packagePkg -PisFullBuild=true --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-macos-arm64
          path: |
            composeApp/build/compose/binaries/main/dmg/*.dmg
            composeApp/build/compose/binaries/main/pkg/*.pkg
          if-no-files-found: error

  ios-ipa:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - run: chmod +x ./gradlew

      - name: Show active Xcode
        run: xcode-select -p && xcodebuild -version

      - name: Prewarm Kotlin framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --stacktrace

      - name: Build iOS archive (unsigned)
        working-directory: iosApp
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          xcodebuild archive \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/SakayoriMusic.xcarchive \
            -derivedDataPath $PWD/build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO

      - name: Package unsigned IPA
        working-directory: iosApp
        run: |
          set -e
          mkdir -p build/Payload
          cp -R build/SakayoriMusic.xcarchive/Products/Applications/iosApp.app build/Payload/SakayoriMusic.app
          cd build
          zip -qry SakayoriMusic-2.1.5-unsigned.ipa Payload
          ls -la SakayoriMusic-2.1.5-unsigned.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-ios-ipa-unsigned
          path: iosApp/build/SakayoriMusic-2.1.5-unsigned.ipa
          if-no-files-found: error
